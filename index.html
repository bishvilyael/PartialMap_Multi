<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>מפת יעלים תקופתית</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="css/app.css" />
</head>

<body>
<div id="map"></div>

<div class="map-header">
  <div class="map-header-box">
    <img class="header-icon" src="icons/header-right.png" alt="">
    <span id="mapTitleText"></span>
    <img class="header-icon" src="icons/header-right.png" alt="">
  </div>
</div>

<div class="month-selector-box">
  <label for="monthSelect">בחר חודש:</label>
  <select id="monthSelect"></select>
  <button id="fullMapBtn" type="button">מפת יעלים מצטברת</button>
</div>

<div class="mobile-tools">
  <button id="searchToggle" class="tool-btn" title="חיפוש">🔍</button>
  <button id="layersToggle" class="tool-btn" title="רשימת יעלים">📋</button>
  <button id="statusToggle" class="tool-btn" title="מידע">ℹ</button>
</div>

<div id="searchPanel" class="search-panel panel-box">
  <div id="searchHeader" class="search-title-row search-header">
    <div class="search-title-main">
      <div class="panel-title">חיפוש במפה</div>
      <div class="search-mode-inline">
        <label><input id="modePoints" name="searchMode" type="radio" value="points" checked> חיפוש יעל</label>
        <label><input id="modeArea" name="searchMode" type="radio" value="area"> חיפוש אזור</label>
      </div>
    </div>
    <div class="search-header-buttons">
      <button id="searchMinimize" class="search-mini-btn" title="מזער">—</button>
      <button id="searchClose" class="search-mini-btn" title="סגור">✕</button>
    </div>
  </div>

  <div class="search-input-row">
    <input id="searchInput" type="text" placeholder="חיפוש לפי שם, Badge, מזהה, תאריך..." />
    <button id="searchActionBtn" class="search-action-btn" type="button">חפש</button>
  </div>

  <label id="exactSearchLabel" class="search-exact">
    <input id="exactSearch" type="checkbox" /> חיפוש מדויק
  </label>

  <div id="searchResults" class="search-results"></div>
</div>

<div id="layersList" class="layers-list-panel panel-box">
  <div class="panel-header">
    <div class="panel-title">רשימת יעלים ממויינת</div>
    <button id="layersClose" class="panel-close-btn" title="סגור">✕</button>
  </div>
  <div id="layersListBody"></div>
</div>

<div id="status" class="status-box panel-box">
  <div class="panel-header">
    <div class="panel-title">מידע</div>
    <button id="statusClose" class="panel-close-btn" title="סגור">✕</button>
  </div>
  <div id="statusBody">טוען נתונים...</div>
</div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin="">
</script>

<script>
(async function () {
  const statusBody = document.getElementById("statusBody");
  const monthSelect = document.getElementById("monthSelect");
  const fullMapBtn = document.getElementById("fullMapBtn");

  const FULL_MAP_URL = "https://bishvilyael.github.io/FullMap_J_Split";

  let cachedGeoJsonText = null;
  let cachedGeoJsonUrl = null;
  let selectedLastModified = null;

  function getHebrewMonthName(monthNumber) {
    const months = {
      "01": "ינואר",
      "02": "פברואר",
      "03": "מרץ",
      "04": "אפריל",
      "05": "מאי",
      "06": "יוני",
      "07": "יולי",
      "08": "אוגוסט",
      "09": "ספטמבר",
      "10": "אוקטובר",
      "11": "נובמבר",
      "12": "דצמבר"
    };

    return months[monthNumber] || monthNumber;
  }

  function mapIdToDisplayName(mapId) {
    const parts = mapId.split("-");
    if (parts.length !== 2) return mapId;

    const year = parts[0];
    const month = parts[1];

    return `${getHebrewMonthName(month)} ${year}`;
  }

  function formatDateForHebrew(dateText) {
    if (!dateText) return "";

    const d = new Date(dateText);
    if (isNaN(d.getTime())) return "";

    return d.toLocaleDateString("he-IL", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });
  }

  async function checkGeoJsonContent(mapId) {
    const url = `json/${mapId}/period.geojson`;

    try {
      const response = await fetch(url, { cache: "no-store" });

      if (!response.ok) {
        return {
          exists: false,
          hasContent: false,
          text: "",
          lastModified: null,
          url
        };
      }

      const text = await response.text();

      return {
        exists: true,
        hasContent: text.trim().length > 0,
        text,
        lastModified: response.headers.get("Last-Modified"),
        url
      };

    } catch (err) {
      return {
        exists: false,
        hasContent: false,
        text: "",
        lastModified: null,
        url
      };
    }
  }

  function addUpdateDateToTitle() {
    const updateText = formatDateForHebrew(selectedLastModified);
    if (!updateText) return;

    const titleEl = document.getElementById("mapTitleText");
    if (!titleEl) return;

    if (titleEl.dataset.updateAdded === "1") return;

    const currentTitle = titleEl.textContent.trim();
    if (!currentTitle) {
      setTimeout(addUpdateDateToTitle, 300);
      return;
    }

    titleEl.innerHTML =
      `${currentTitle}<br><span style="font-size: 13px; font-weight: normal;">עודכן: ${updateText}</span>`;

    titleEl.dataset.updateAdded = "1";
  }

  try {
    const params = new URLSearchParams(window.location.search);
    const requestedMap = params.get("map");

    if (fullMapBtn) {
      fullMapBtn.addEventListener("click", function () {
        window.open(FULL_MAP_URL, "_blank");
      });
    }

    const mapsResponse = await fetch("maps.json");

    if (!mapsResponse.ok) {
      throw new Error("לא נמצא הקובץ maps.json");
    }

    const maps = await mapsResponse.json();

    if (!Array.isArray(maps) || maps.length === 0) {
      throw new Error("maps.json ריק או לא תקין");
    }

    const today = new Date();

    const currentYear = today.getFullYear();
    const currentMonth = String(today.getMonth() + 1).padStart(2, "0");
    const currentMonthId = `${currentYear}-${currentMonth}`;

    const previousMonthDate = new Date(
      today.getFullYear(),
      today.getMonth() - 1,
      1
    );

    const previousYear = previousMonthDate.getFullYear();
    const previousMonth = String(previousMonthDate.getMonth() + 1).padStart(2, "0");
    const previousMonthId = `${previousYear}-${previousMonth}`;

    const currentMapInIndex = maps.find(m => m.id === currentMonthId);
    const currentMonthCheck = currentMapInIndex
      ? await checkGeoJsonContent(currentMonthId)
      : { hasContent: false };

    const availableMaps = maps
      .filter(m => {
        if (m.id < currentMonthId) return true;
        if (m.id === currentMonthId && currentMonthCheck.hasContent) return true;
        return false;
      })
      .sort((a, b) => b.id.localeCompare(a.id));

    if (availableMaps.length === 0) {
      throw new Error("אין מפות זמינות");
    }

    let selectedMap;

    if (requestedMap) {
      if (requestedMap > currentMonthId) {
        throw new Error("לא ניתן להציג מפה של חודש עתידי");
      }

      if (requestedMap === currentMonthId && !currentMonthCheck.hasContent) {
        throw new Error("לקובץ החודש הנוכחי אין עדיין תוכן");
      }

      selectedMap = availableMaps.find(m => m.id === requestedMap);

    } else {
      if (currentMapInIndex && currentMonthCheck.hasContent) {
        selectedMap = currentMapInIndex;
        cachedGeoJsonText = currentMonthCheck.text;
        cachedGeoJsonUrl = currentMonthCheck.url;
        selectedLastModified = currentMonthCheck.lastModified;
      } else {
        selectedMap =
          availableMaps.find(m => m.id === previousMonthId) ||
          availableMaps[0];
      }
    }

    if (!selectedMap) {
      throw new Error("המפה המבוקשת לא קיימת ב-maps.json");
    }

    monthSelect.innerHTML = "";

    availableMaps.forEach(m => {
      const option = document.createElement("option");
      option.value = m.id;
      option.textContent = mapIdToDisplayName(m.id);

      if (m.id === selectedMap.id) {
        option.selected = true;
      }

      monthSelect.appendChild(option);
    });

    monthSelect.addEventListener("change", function () {
      window.location.href = `?map=${this.value}`;
    });

    window.CURRENT_MAP_ID = selectedMap.id;
    window.CURRENT_MAP_FOLDER = `json/${selectedMap.id}`;
    window.PERIOD_GEOJSON_URL = `${window.CURRENT_MAP_FOLDER}/period.geojson`;
    window.MAP_TITLE_URL = `${window.CURRENT_MAP_FOLDER}/map-title.json`;

    if (!cachedGeoJsonText || cachedGeoJsonUrl !== window.PERIOD_GEOJSON_URL) {
      const selectedCheck = await checkGeoJsonContent(selectedMap.id);

      if (!selectedCheck.hasContent) {
        throw new Error("לקובץ period.geojson של החודש שנבחר אין תוכן");
      }

      cachedGeoJsonText = selectedCheck.text;
      cachedGeoJsonUrl = selectedCheck.url;
      selectedLastModified = selectedCheck.lastModified;
    }

    const originalFetch = window.fetch.bind(window);

    window.fetch = function (resource, options) {
      if (typeof resource === "string") {
        if (resource === "json/period.geojson") {
          return Promise.resolve(new Response(cachedGeoJsonText, {
            status: 200,
            headers: {
              "Content-Type": "application/json"
            }
          }));
        }

        if (resource === "map-title.json") {
          resource = window.MAP_TITLE_URL;
        }
      }

      return originalFetch(resource, options);
    };

    const scripts = [
      "js/config.js",
      "js/state.js",
      "js/dom.js",
      "js/title.js",
      "js/helpers.js",
      "js/search.js",
      "js/geojson.js",
      "js/ui.js",
      "js/main.js"
    ];

    for (const src of scripts) {
      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error("שגיאה בטעינת " + src));
        document.body.appendChild(script);
      });
    }

	if (selectedMap.id === currentMonthId) {
	  setTimeout(addUpdateDateToTitle, 500);
	  setTimeout(addUpdateDateToTitle, 1200);
	}

  } catch (err) {
    console.error(err);

    if (statusBody) {
      statusBody.textContent = "שגיאה בטעינת המפה: " + err.message;
    }
  }
})();
</script>

</body>
</html>
